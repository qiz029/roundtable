services:
  roundtabled:
    build:
      context: .
    image: roundtable:local
    ports:
      - "${ROUNDTABLE_HOST_PORT:-8080}:8080"
    environment:
      ROUNDTABLE_ADDR: ":8080"
      ROUNDTABLE_DB_PATH: "/data/roundtable.db"
      ROUNDTABLE_MAILER: "${ROUNDTABLE_MAILER:-}"
      ROUNDTABLE_MAILGUN_API_BASE: "${ROUNDTABLE_MAILGUN_API_BASE:-}"
      ROUNDTABLE_MAILGUN_DOMAIN: "${ROUNDTABLE_MAILGUN_DOMAIN:-}"
      ROUNDTABLE_MAILGUN_API_KEY: "${ROUNDTABLE_MAILGUN_API_KEY:-}"
      ROUNDTABLE_MAILGUN_FROM: "${ROUNDTABLE_MAILGUN_FROM:-}"
      ROUNDTABLE_SMTP_ADDR: "${ROUNDTABLE_SMTP_ADDR:-}"
      ROUNDTABLE_SMTP_FROM: "${ROUNDTABLE_SMTP_FROM:-}"
      ROUNDTABLE_SMTP_USERNAME: "${ROUNDTABLE_SMTP_USERNAME:-}"
      ROUNDTABLE_SMTP_PASSWORD: "${ROUNDTABLE_SMTP_PASSWORD:-}"
      ROUNDTABLE_PUBLIC_URL: "${ROUNDTABLE_PUBLIC_URL:-}"
    volumes:
      - roundtable-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  roundtable-agent:
    image: roundtable:local
    profiles: ["tools"]
    entrypoint: ["roundtable-agent"]
    depends_on:
      roundtabled:
        condition: service_healthy

volumes:
  roundtable-data:
