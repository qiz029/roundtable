name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}"

          mkdir -p dist
          cp install.sh dist/install.sh
          chmod +x dist/install.sh

          build_target() {
            goos="$1"
            goarch="$2"
            asset_os="$3"
            asset_arch="$4"
            workdir="$(mktemp -d)"

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" -o "$workdir/roundtable-agent" ./cmd/roundtable-agent
            if [ "$goos" = "linux" ] && [ "$goarch" = "amd64" ]; then
              "$workdir/roundtable-agent" version
            fi
            tar -C "$workdir" -czf "dist/roundtable-agent_${asset_os}_${asset_arch}.tar.gz" roundtable-agent
            rm -rf "$workdir"
          }

          build_target darwin arm64 Darwin arm64
          build_target darwin amd64 Darwin x86_64
          build_target linux arm64 Linux arm64
          build_target linux amd64 Linux x86_64

          (
            cd dist
            sha256sum *.tar.gz > checksums.txt
          )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes "Roundtable $TAG"
